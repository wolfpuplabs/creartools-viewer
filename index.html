<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Studio | Private Workspace</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root { 
      --primary: #0071e3; --primary-hover: #005bb5;
      --bg-color: #f5f5f7; --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(255, 255, 255, 0.5);
      --text-main: #1d1d1f; --text-muted: #86868b;
      --danger: #ff3b30; --success: #34c759;
    }

    body { 
      font-family: 'Inter', sans-serif; max-width: 1000px; margin: 0 auto; padding: 40px 20px; 
      background-color: var(--bg-color); 
      background-image: radial-gradient(circle at 10% 20%, rgba(0, 113, 227, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(52, 199, 89, 0.05) 0%, transparent 50%);
      background-attachment: fixed; color: var(--text-main); 
    }

    h1, h2, h3 { font-weight: 700; letter-spacing: -0.5px; }
    .header { text-align: center; margin-bottom: 30px; position: relative; }
    .header h1 { font-size: 2.5rem; margin-bottom: 5px; }
    .header p { color: var(--text-muted); font-size: 1.1rem; }
    
    .logout-btn { position: absolute; right: 0; top: 0; background: none; border: none; color: var(--danger); font-weight: 600; cursor: pointer; display: none; font-size: 1rem;}

    .container { display: flex; flex-direction: column; gap: 30px; }
    
    .section-box { 
      background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 30px; border-radius: 24px; border: 1px solid var(--card-border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
    }

    /* Auth Form Styles */
    #authContainer { max-width: 400px; margin: 0 auto; }
    .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: 600; border-radius: 10px; color: var(--text-muted); transition: 0.3s; }
    .auth-tab.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    .input-group { margin-bottom: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
    input[type="text"], input[type="email"], input[type="password"] { 
      width: 100%; padding: 14px; border: 1px solid #d2d2d7; border-radius: 12px; 
      font-size: 15px; background: rgba(255,255,255,0.8); box-sizing: border-box; 
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }
    
    .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
    .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
    .file-upload-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(0, 113, 227, 0.1); color: var(--primary); border: 2px dashed var(--primary); padding: 15px; border-radius: 12px; font-weight: 600; }

    button.btn-primary { background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
    button.btn-primary:active { transform: scale(0.98); }
    button:disabled { background: #999; cursor: not-allowed; }
    
    .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 20px; }
    .asset-card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; }
    model-viewer { width: 100%; height: 220px; background-color: #fafafa; border-radius: 12px; margin-bottom: 15px; }
    .asset-title { font-size: 1.1rem; font-weight: 600; margin: 0 0 15px 0; }
    
    .btn-group { display: flex; gap: 8px; margin-bottom: 8px;}
    .btn-secondary { background: #f5f5f7; color: var(--text-main); border: none; padding: 8px 12px; border-radius: 8px; font-weight: 600; cursor: pointer; flex: 1; font-size: 0.85rem; }
    .btn-danger { background: rgba(255, 59, 48, 0.1); color: var(--danger); border: none; padding: 8px 12px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; font-size: 0.85rem;}

    .status-msg { padding: 12px; border-radius: 10px; font-weight: 500; text-align: center; margin-top: 15px; font-size: 0.9rem; }
    .success { background: rgba(52, 199, 89, 0.1); color: var(--success); }
    .error { background: rgba(255, 59, 48, 0.1); color: var(--danger); }
    .loading { background: rgba(0, 113, 227, 0.1); color: var(--primary); }

    /* Hide app container by default */
    #appContainer { display: none; }
  </style>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

  <div class="header">
    <h1>AR Studio</h1>
    <p>Ruang Kerja Pribadi Anda</p>
    <button class="logout-btn" id="logoutBtn" onclick="prosesLogout()">Keluar Akun</button>
  </div>

  <div class="section-box" id="authContainer">
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="setMode('login')">Masuk</div>
      <div class="auth-tab" id="tabRegister" onclick="setMode('register')">Daftar Baru</div>
    </div>
    
    <form id="authForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="authEmail" placeholder="contoh@email.com" required>
      </div>
      <div class="input-group">
        <label>Password (Min. 6 Karakter)</label>
        <input type="password" id="authPassword" placeholder="••••••" required minlength="6">
      </div>
      <button type="submit" class="btn-primary" id="authSubmitBtn">Masuk Sekarang</button>
    </form>
    <div id="authStatus"></div>
  </div>

  <div class="container" id="appContainer">
    
    <div id="sharedBanner" class="section-box" style="display:none; border: 2px solid var(--primary);">
      <h2 style="color:var(--primary);">📦 Model yang Dibagikan</h2>
      <div id="sharedContent"></div>
    </div>

    <div class="section-box">
      <h2>Unggah Aset 3D</h2>
      <form id="uploadForm">
        <div class="input-group">
          <input type="text" id="assetName" placeholder="Nama Aset (contoh: Kursi Kayu)" required>
        </div>
        <div class="input-group">
          <div class="file-upload-wrapper">
            <div class="file-upload-btn">
              <span id="fileNameDisplay">Pilih File .glb / .gltf</span>
            </div>
            <input type="file" id="assetFile" accept=".glb,.gltf" required>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="uploadBtn">Simpan ke Brankas</button>
      </form>
      <div id="uploadStatus"></div>
    </div>

    <div class="section-box">
      <h2>Brankas Saya</h2>
      <div id="libraryContainer"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ogmtrdzimqlxhzomnnzl.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nbXRyZHppbXFseGh6b21ubnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MjI4ODgsImV4cCI6MjA5NjI5ODg4OH0.fXdfuU7iELLJC2ZJXrQMBq3YxZd2hRQc7Mi2TjZR7N8';
    
    let userToken = localStorage.getItem('sb_token') || null;
    let authMode = 'login'; // 'login' atau 'register'

    // --- MANAJEMEN TAMPILAN (UI) ---
    const authContainer = document.getElementById('authContainer');
    const appContainer = document.getElementById('appContainer');
    const logoutBtn = document.getElementById('logoutBtn');
    
    function periksaSesi() {
      if (userToken) {
        authContainer.style.display = 'none';
        appContainer.style.display = 'flex';
        logoutBtn.style.display = 'block';
        muatKoleksiAset();
      } else {
        authContainer.style.display = 'block';
        appContainer.style.display = 'none';
        logoutBtn.style.display = 'none';
      }
      periksaLinkShare(); // Cek apakah ada yg membagikan link
    }

    function setMode(mode) {
      authMode = mode;
      document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
      document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
      document.getElementById('authSubmitBtn').innerText = mode === 'login' ? 'Masuk Sekarang' : 'Daftar & Buat Akun';
      document.getElementById('authStatus').innerHTML = '';
    }

    function getHeaders() {
      return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${userToken}`, 'Content-Type': 'application/json' };
    }

    // --- FITUR AUTENTIKASI ---
    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      const statusDiv = document.getElementById('authStatus');
      const btn = document.getElementById('authSubmitBtn');
      
      btn.disabled = true;
      statusDiv.innerHTML = '<div class="status-msg loading">Memproses...</div>';

      try {
        let endpoint = authMode === 'login' ? '/auth/v1/token?grant_type=password' : '/auth/v1/signup';
        const res = await fetch(`${SUPABASE_URL}${endpoint}`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error_description || data.msg || 'Gagal autentikasi');

        userToken = data.access_token;
        localStorage.setItem('sb_token', userToken);
        
        document.getElementById('authForm').reset();
        periksaSesi();

      } catch (err) {
        statusDiv.innerHTML = `<div class="status-msg error">🚨 ${err.message}</div>`;
      } finally {
        btn.disabled = false;
      }
    });

    function prosesLogout() {
      localStorage.removeItem('sb_token');
      userToken = null;
      periksaSesi();
    }

    // --- FITUR CEK LINK SHARE ---
    function periksaLinkShare() {
      const urlParams = new URLSearchParams(window.location.search);
      const modelUrl = urlParams.get('model');
      const modelName = urlParams.get('name') || 'Model Dibagikan';

      if (modelUrl) {
        // Tampilkan untuk siapapun (bahkan yang belum login)
        appContainer.style.display = 'flex'; 
        document.getElementById('sharedBanner').style.display = 'block';
        document.getElementById('sharedContent').innerHTML = `
          <h3 style="margin-top:0;">${decodeURIComponent(modelName)}</h3>
          <model-viewer src="${decodeURIComponent(modelUrl)}" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate style="height: 300px; background:#fafafa;"></model-viewer>
          <button class="btn-primary" style="margin-top:10px" onclick="window.location.search=''">Tutup Tampilan Share</button>
        `;
      }
    }

    // --- FITUR DATABASE (UPLOAD & MUAT & HAPUS) ---
    document.getElementById('assetFile').addEventListener('change', (e) => {
      document.getElementById('fileNameDisplay').innerText = e.target.files.length > 0 ? e.target.files[0].name : "Pilih File .glb / .gltf";
    });

    async function muatKoleksiAset() {
      const container = document.getElementById('libraryContainer');
      container.innerHTML = '<p style="text-align:center; color:#888;">Memuat data rahasia...</p>';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/user_assets?select=*&order=created_at.desc`, { method: 'GET', headers: getHeaders() });
        if (!res.ok) {
          if(res.status === 401) { prosesLogout(); return; } // Token expired
          throw new Error('Gagal memuat');
        }
        
        const data = await res.json();

        if (data.length === 0) {
          container.innerHTML = '<p style="text-align:center; color:#888;">Brankas kosong. Ayo unggah model pertamamu!</p>';
          return;
        }

        let html = '<div class="library-grid">';
        data.forEach(asset => {
          const shareLink = `${window.location.origin}${window.location.pathname}?model=${encodeURIComponent(asset.file_url)}&name=${encodeURIComponent(asset.asset_name)}`;
          html += `
            <div class="asset-card" id="card-${asset.id}">
              <h3 class="asset-title">${asset.asset_name}</h3>
              <model-viewer src="${asset.file_url}" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate></model-viewer>
              <div class="btn-group">
                <button class="btn-secondary" onclick="window.open('${asset.file_url}', '_blank')">Layar Penuh</button>
                <button class="btn-secondary" style="background:#e8f2ff; color:#0071e3;" onclick="navigator.clipboard.writeText('${shareLink}').then(()=>alert('Link Tersalin!'))">🔗 Share</button>
              </div>
              <button class="btn-danger" onclick="hapusAset('${asset.id}', '${asset.file_path}')">🗑 Hapus Aset</button>
            </div>
          `;
        });
        html += '</div>';
        container.innerHTML = html;

      } catch (err) {
        container.innerHTML = `<div class="status-msg error">Error: ${err.message}</div>`;
      }
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = document.getElementById('assetFile').files[0];
      const name = document.getElementById('assetName').value;
      const statusDiv = document.getElementById('uploadStatus');
      const btn = document.getElementById('uploadBtn');

      btn.disabled = true; btn.innerText = "Mengamankan...";
      statusDiv.innerHTML = '<div class="status-msg loading">⏳ Menyimpan ke brankas rahasia...</div>';

      try {
        const filePath = `models/${Date.now()}_${Math.floor(Math.random()*1000)}.${file.name.split('.').pop()}`;

        // 1. Upload Storage (Gunakan fetch mentah tanpa library)
        const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/ar_assets/${filePath}`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${userToken}`, 'Content-Type': file.type || 'application/octet-stream' },
          body: file
        });
        if (!uploadRes.ok) throw new Error("Gagal unggah file.");

        const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/ar_assets/${filePath}`;

        // 2. Simpan Database
        const dbRes = await fetch(`${SUPABASE_URL}/rest/v1/user_assets`, {
          method: 'POST',
          headers: { ...getHeaders(), 'Prefer': 'return=minimal' },
          body: JSON.stringify({ asset_name: name, file_url: fileUrl, file_path: filePath })
        });
        if (!dbRes.ok) throw new Error("Gagal menyimpan data.");

        statusDiv.innerHTML = '<div class="status-msg success">✨ Aset berhasil diamankan di Brankas!</div>';
        document.getElementById('uploadForm').reset();
        document.getElementById('fileNameDisplay').innerText = "Pilih File .glb / .gltf";
        muatKoleksiAset();

      } catch (err) {
        statusDiv.innerHTML = `<div class="status-msg error">🚨 Gagal: ${err.message}</div>`;
      } finally {
        btn.disabled = false; btn.innerText = "Simpan ke Brankas";
        setTimeout(() => { if(statusDiv.innerText.includes('berhasil')) statusDiv.innerHTML = ''; }, 4000);
      }
    });

    // Fitur Menghapus Aset
    async function hapusAset(id, filePath) {
      if (!confirm('Yakin ingin menghapus aset ini selamanya?')) return;
      const card = document.getElementById(`card-${id}`);
      card.style.opacity = '0.5';

      try {
        // Hapus dari Storage
        await fetch(`${SUPABASE_URL}/storage/v1/object/ar_assets/${filePath}`, { method: 'DELETE', headers: getHeaders() });
        // Hapus dari DB
        await fetch(`${SUPABASE_URL}/rest/v1/user_assets?id=eq.${id}`, { method: 'DELETE', headers: getHeaders() });
        
        card.remove(); // Hilangkan dari layar
        if(document.querySelectorAll('.asset-card').length === 0) muatKoleksiAset(); // Refresh jika kosong
      } catch (e) {
        alert("Gagal menghapus aset.");
        card.style.opacity = '1';
      }
    }

    // Jalankan awal
    periksaSesi();
  </script>
</body>
</html>
