<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creartor AR | Workspace</title>
  
  <style>
    /* UI/UX REDESIGN: Vercel-like Minimalist Dark Theme */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root { 
      --bg-base: #000000;
      --bg-surface: #111111;
      --bg-surface-hover: #1a1a1a;
      --border-color: #333333;
      --border-hover: #444444;
      --text-main: #ffffff;
      --text-muted: #888888;
      --primary: #ffffff;
      --primary-invert: #000000;
      --accent: #0070f3;
      --danger: #e00;
      --success: #0070f3;
      --radius: 8px;
    }

    body { 
      font-family: 'Inter', -apple-system, sans-serif; 
      margin: 0; 
      padding: 0; 
      background-color: var(--bg-base); 
      color: var(--text-main); 
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 { font-weight: 600; margin: 0; }
    
    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: -0.5px;
    }

    .brand img {
      height: 28px; /* Sesuaikan ukuran logomu */
      width: auto;
      border-radius: 4px;
    }

    .logout-btn { 
      background: none; border: none; color: var(--text-muted); font-weight: 500; 
      cursor: pointer; display: none; font-size: 0.9rem; transition: color 0.2s;
    }
    .logout-btn:hover { color: var(--text-main); }

    .container { max-width: 1000px; margin: 40px auto; padding: 0 24px; display: flex; flex-direction: column; gap: 40px; }
    
    /* Vercel-like Cards */
    .section-box { 
      background: var(--bg-base); 
      padding: 32px; 
      border-radius: var(--radius); 
      border: 1px solid var(--border-color);
    }
    .section-header { margin-bottom: 24px; }
    .section-header h2 { font-size: 1.5rem; letter-spacing: -0.5px; }
    .section-header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 6px; }

    /* Auth Form Styles */
    #authContainer { max-width: 420px; margin: 80px auto; padding: 40px; }
    .auth-tabs { display: flex; gap: 24px; margin-bottom: 32px; border-bottom: 1px solid var(--border-color); }
    .auth-tab { padding-bottom: 12px; cursor: pointer; font-weight: 500; color: var(--text-muted); transition: 0.2s; position: relative; }
    .auth-tab.active { color: var(--text-main); }
    .auth-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--primary); }

    .input-group { margin-bottom: 20px; }
    label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-muted); }
    input[type="text"], input[type="email"], input[type="password"] { 
      width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 6px; 
      font-size: 14px; background: var(--bg-surface); color: var(--text-main); box-sizing: border-box; 
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--text-muted); }
    
    .file-upload-wrapper { position: relative; overflow: hidden; display: block; width: 100%; }
    .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
    .file-upload-btn { 
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; 
      background: var(--bg-surface); color: var(--text-muted); border: 1px dashed var(--border-color); 
      padding: 32px 16px; border-radius: var(--radius); font-size: 0.9rem; transition: 0.2s; 
    }
    .file-upload-wrapper:hover .file-upload-btn { border-color: var(--text-muted); background: var(--bg-surface-hover); }

    button.btn-primary { 
      background: var(--primary); color: var(--primary-invert); border: 1px solid var(--primary); 
      padding: 12px 24px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; 
      width: 100%; transition: 0.2s; 
    }
    button.btn-primary:hover { background: transparent; color: var(--primary); }
    button:disabled { background: var(--border-color); color: var(--text-muted); border-color: var(--border-color); cursor: not-allowed; }
    
    /* Library Grid */
    .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .asset-card { 
      background: var(--bg-base); border-radius: var(--radius); padding: 20px; 
      border: 1px solid var(--border-color); transition: border-color 0.2s; display: flex; flex-direction: column;
    }
    .asset-card:hover { border-color: var(--border-hover); }
    model-viewer { width: 100%; height: 240px; background-color: var(--bg-surface); border-radius: 4px; margin-bottom: 20px; outline: none; }
    .asset-title { font-size: 1rem; font-weight: 500; margin: 0 0 16px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
    .btn-secondary { 
      background: var(--bg-surface); color: var(--text-main); border: 1px solid var(--border-color); 
      padding: 8px 12px; border-radius: 6px; font-weight: 500; cursor: pointer; flex: 1; font-size: 0.8rem; transition: 0.2s;
    }
    .btn-secondary:hover { background: var(--bg-surface-hover); border-color: var(--text-muted); }
    
    .btn-danger { 
      background: transparent; color: var(--danger); border: 1px solid var(--border-color); 
      padding: 8px 12px; border-radius: 6px; font-weight: 500; cursor: pointer; width: 100%; font-size: 0.8rem; transition: 0.2s;
    }
    .btn-danger:hover { border-color: var(--danger); }

    .status-msg { padding: 12px 16px; border-radius: 6px; font-weight: 500; margin-top: 16px; font-size: 0.85rem; border: 1px solid transparent; }
    .success { background: rgba(0, 112, 243, 0.1); color: var(--accent); border-color: rgba(0, 112, 243, 0.2); }
    .error { background: rgba(238, 0, 0, 0.1); color: var(--danger); border-color: rgba(238, 0, 0, 0.2); }
    .loading { background: var(--bg-surface); color: var(--text-main); border-color: var(--border-color); }

    #appContainer { display: none; }
  </style>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

  <div class="section-box" id="authContainer">

    <div class="auth-tabs">

    <form id="authForm">

  <div class="container" id="appContainer">
    
    <div id="sharedBanner" class="section-box" style="display:none; border-color: var(--accent);">

    </div>

    <div class="section-box">
      <div class="section-header">

      <form id="uploadForm">
        <div class="input-group">
          <label>Asset Name</label>

              <span id="fileNameDisplay">Click or drag file to upload</span>
            </div>
            <input type="file" id="assetFile" accept=".glb,.gltf" required>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="uploadBtn">Upload Asset</button>
      </form>
      <div id="uploadStatus"></div>
    </div>

    <div class="section-box" style="border:none; padding: 0; background: transparent;">
      <div class="section-header">
        <h2>My Repository</h2>
        <p>Manage your uploaded 3D assets.</p>
      </div>
      <div id="libraryContainer"></div>
    </div>
  </div>
