<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Asset Library</title>
  
  <!-- CSS Sederhana untuk mempercantik tampilan -->
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
    .upload-section { background: #f0f0f0; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
    .upload-section input, .upload-section button { margin: 5px 0; padding: 8px; width: 100%; box-sizing: border-box; }
    .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .asset-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
    model-viewer { width: 100%; height: 200px; background-color: #eee; border-radius: 4px; }
  </style>

  <!-- 1. Import library Supabase dan Model Viewer via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

  <h1>AR Asset Library</h1>

  <!-- Bagian Upload -->
  <div class="upload-section">
    <h3>Upload Aset Baru</h3>
    <form id="uploadForm">
      <input type="text" id="assetName" placeholder="Nama Aset (contoh: Kursi Kayu)" required>
      <input type="file" id="assetFile" accept=".glb,.gltf" required>
      <button type="submit" id="submitBtn">Upload ke Supabase</button>
    </form>
    <p id="uploadStatus" style="color: blue; font-size: 14px;"></p>
  </div>

  <!-- Bagian Library / Galeri -->
  <h3>Koleksi Aset Saya</h3>
  <div class="library-grid" id="libraryContainer">
    <p>Memuat aset...</p>
  </div>

  <!-- 2. Logika JavaScript -->
  <script>
    // --- INISIALISASI SUPABASE ---
    const SUPABASE_URL = 'https://ogmtrdzimqlxhzomnnzl.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nbXRyZHppbXFseGh6b21ubnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MjI4ODgsImV4cCI6MjA5NjI5ODg4OH0.fXdfuU7iELLJC2ZJXrQMBq3YxZd2hRQc7Mi2TjZR7N8';
    
    // Membuat instance client Supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- REFERENSI ELEMEN HTML ---
    const uploadForm = document.getElementById('uploadForm');
    const assetNameInput = document.getElementById('assetName');
    const assetFileInput = document.getElementById('assetFile');
    const submitBtn = document.getElementById('submitBtn');
    const uploadStatus = document.getElementById('uploadStatus');
    const libraryContainer = document.getElementById('libraryContainer');

    // --- FUNGSI MENGAMBIL DAN MENAMPILKAN ASET ---
    async function fetchAndDisplayAssets() {
      libraryContainer.innerHTML = '<p>Memuat aset...</p>';

      // Ambil data dari tabel 'user_assets'
      const { data, error } = await supabase
        .from('user_assets')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error fetching data:', error);
        libraryContainer.innerHTML = '<p style="color:red;">Gagal memuat data.</p>';
        return;
      }

      if (data.length === 0) {
        libraryContainer.innerHTML = '<p>Belum ada aset yang diupload.</p>';
        return;
      }

      // Bersihkan container dan buat elemen untuk setiap aset
      libraryContainer.innerHTML = '';
      data.forEach(asset => {
        const card = document.createElement('div');
        card.className = 'asset-card';
        card.innerHTML = `
          <h4>${asset.asset_name}</h4>
          <!-- Model Viewer untuk menampilkan 3D / AR -->
          <model-viewer 
            src="${asset.file_url}" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            auto-rotate>
          </model-viewer>
          <p style="font-size: 12px; color: #666;">
            Diunggah: ${new Date(asset.created_at).toLocaleDateString()}
          </p>
        `;
        libraryContainer.appendChild(card);
      });
    }

    // --- FUNGSI MENGUPLOAD ASET ---
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const file = assetFileInput.files[0];
      const assetName = assetNameInput.value;

      submitBtn.disabled = true;
      uploadStatus.innerText = 'Sedang mengupload file... Mohon tunggu.';

      try {
        // 1. Upload ke Storage
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = `models/${fileName}`;

        const { error: storageError } = await supabase
          .storage
          .from('ar_assets')
          .upload(filePath, file);

        if (storageError) throw storageError;

        // 2. Dapatkan URL Publik
        uploadStatus.innerText = 'Menyimpan data ke database...';
        const { data: publicUrlData } = supabase
          .storage
          .from('ar_assets')
          .getPublicUrl(filePath);

        const fileUrl = publicUrlData.publicUrl;

        // 3. Simpan ke Database
        const { error: dbError } = await supabase
          .from('user_assets')
          .insert([{ 
            asset_name: assetName, 
            file_url: fileUrl, 
            file_path: filePath 
          }]);

        if (dbError) throw dbError;

        // 4. Sukses
        uploadStatus.style.color = 'green';
        uploadStatus.innerText = 'Upload berhasil!';
        uploadForm.reset();
        
        // Refresh library untuk menampilkan aset baru
        fetchAndDisplayAssets();

      } catch (error) {
        console.error('Upload error:', error);
        uploadStatus.style.color = 'red';
        uploadStatus.innerText = `Gagal mengupload: ${error.message}`;
      } finally {
        submitBtn.disabled = false;
        setTimeout(() => { uploadStatus.innerText = ''; uploadStatus.style.color = 'blue'; }, 3000);
      }
    });

    // --- JALANKAN SAAT HALAMAN DIMUAT ---
    fetchAndDisplayAssets();

  </script>
</body>
</html>
