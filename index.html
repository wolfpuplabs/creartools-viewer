<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic Radar</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
    .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    button { background: #007aff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    #log { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 8px; font-family: monospace; min-height: 100px; white-space: pre-wrap; font-size: 14px; margin-top: 15px; }
  </style>
</head>
<body>

  <div class="box">
    <h2>Radar Investigasi Supabase</h2>
    <p>Klik tombol di bawah untuk menembak server database secara langsung tanpa library.</p>
    <button onclick="tembakDatabase()">🚀 Tembak Database Sekarang</button>
    <div id="log">Menunggu instruksi...</div>
  </div>

  <script>
    const logBox = document.getElementById('log');

    function catatLog(pesan) {
      logBox.innerHTML += `\n> ${pesan}`;
    }

    async function tembakDatabase() {
      logBox.innerHTML = "> Memulai proses...";
      const SUPABASE_URL = 'https://ogmtrdzimqlxhzomnnzl.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nbXRyZHppbXFseGh6b21ubnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MjI4ODgsImV4cCI6MjA5NjI5ODg4OH0.fXdfuU7iELLJC2ZJXrQMBq3YxZd2hRQc7Mi2TjZR7N8';
      
      // Menggunakan URL API Mentah (Raw API)
      const targetUrl = `${SUPABASE_URL}/rest/v1/user_assets?select=*&limit=1`;
      
      catatLog("Membangun jaringan ke: " + targetUrl);
      catatLog("Mengirim request...");

      try {
        const response = await fetch(targetUrl, {
          method: 'GET',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          }
        });

        catatLog(`Server merespons dengan Status: ${response.status} (${response.statusText})`);

        if (!response.ok) {
          const errorText = await response.text();
          catatLog("🚨 ERROR DARI SERVER: " + errorText);
          return;
        }

        const data = await response.json();
        catatLog("✅ SUKSES! Database berhasil ditembus.");
        catatLog("Isi Data: " + JSON.stringify(data));

      } catch (error) {
        catatLog("🚨 JARINGAN TERBLOKIR / CRASH: " + error.message);
        catatLog("Saran: Coba matikan VPN, Ad-Blocker, atau buka dari HP lain/koneksi WiFi lain.");
      }
    }
  </script>
</body>
</html>
