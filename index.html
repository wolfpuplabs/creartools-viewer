<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Studio & Asset Library</title>
  
  <style>
    /* UI/UX REDESIGN: Modern iOS/macOS Glassmorphism Style */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root { 
      --primary: #0071e3; 
      --primary-hover: #005bb5;
      --bg-color: #f5f5f7; 
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(255, 255, 255, 0.5);
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --danger: #ff3b30;
      --success: #34c759;
    }

    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
      max-width: 1000px; 
      margin: 0 auto; 
      padding: 40px 20px; 
      background-color: var(--bg-color); 
      background-image: radial-gradient(circle at 10% 20%, rgba(0, 113, 227, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(52, 199, 89, 0.05) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main); 
    }

    h1, h2, h3 { font-weight: 700; letter-spacing: -0.5px; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .header p { color: var(--text-muted); font-size: 1.1rem; }

    .container { display: flex; flex-direction: column; gap: 30px; }
    
    /* Glassmorphism Cards */
    .section-box { 
      background: var(--card-bg); 
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 30px; 
      border-radius: 24px; 
      border: 1px solid var(--card-border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
    }

    /* Modern Forms */
    .input-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
    input[type="text"] { 
      width: 100%; padding: 16px; border: 1px solid #d2d2d7; border-radius: 12px; 
      font-size: 16px; background: rgba(255,255,255,0.8); box-sizing: border-box; transition: 0.3s;
    }
    input[type="text"]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }
    
    /* Custom File Upload Button */
    .file-upload-wrapper {
      position: relative; overflow: hidden; display: inline-block; width: 100%;
    }
    .file-upload-wrapper input[type="file"] {
      font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%;
    }
    .file-upload-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: rgba(0, 113, 227, 0.1); color: var(--primary); border: 2px dashed var(--primary);
      padding: 20px; border-radius: 12px; text-align: center; font-weight: 600; transition: 0.3s;
    }
    .file-upload-wrapper:hover .file-upload-btn { background: rgba(0, 113, 227, 0.15); }

    button.btn-primary { 
      background: var(--primary); color: white; border: none; padding: 16px 24px; 
      border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; 
      transition: transform 0.1s, background 0.2s; 
    }
    button.btn-primary:active { transform: scale(0.98); }
    button:disabled { background: #999; cursor: not-allowed; transform: none; }

    /* Gallery Grid */
    .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-top: 20px; }
    .asset-card { 
      background: white; border-radius: 20px; padding: 20px; text-align: center; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.04); transition: transform 0.2s; border: 1px solid #f0f0f0;
      position: relative;
    }
    .asset-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    
    model-viewer { width: 100%; height: 250px; background-color: #fafafa; border-radius: 12px; margin-bottom: 15px; outline: none; }
    
    .asset-title { font-size: 1.2rem; font-weight: 600; margin: 0 0 5px 0; color: var(--text-main); }
    .asset-timer { font-size: 0.85rem; color: var(--danger); font-weight: 500; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 5px; }
    
    .btn-group { display: flex; gap: 10px; }
    .btn-secondary { 
      background: #f5f5f7; color: var(--text-main); border: none; padding: 10px 15px; 
      border-radius: 10px; font-weight: 600; cursor: pointer; flex: 1; transition: 0.2s; font-size: 0.9rem;
    }
    .btn-secondary:hover { background: #e5e5ea; }

    .status-msg { padding: 15px; border-radius: 12px; font-weight: 500; text-align: center; margin-top: 15px; font-size: 0.95rem; }
    .success { background: rgba(52, 199, 89, 0.1); color: var(--success); }
    .error { background: rgba(255, 59, 48, 0.1); color: var(--danger); }
    .loading { background: rgba(0, 113, 227, 0.1); color: var(--primary); }
  </style>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

  <div class="header">
    <h1>AR Studio</h1>
    <p>Unggah, lihat, dan bagikan aset 3D Anda. (Aset akan otomatis terhapus dalam 24 jam)</p>
  </div>

  <div class="container">
    <div class="section-box">
      <h2>Unggah Aset Baru</h2>
      <form id="uploadForm">
        <div class="input-group">
          <label for="assetName">Nama Objek 3D</label>
          <input type="text" id="assetName" placeholder="Contoh: Porsche 356 Black" required>
        </div>
        
        <div class="input-group">
          <div class="file-upload-wrapper">
            <div class="file-upload-btn" id="fileBtnUI">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              <span id="fileNameDisplay">Pilih File .glb / .gltf</span>
            </div>
            <input type="file" id="assetFile" accept=".glb,.gltf" required>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">Mulai Unggah</button>
      </form>
      <div id="statusMessage"></div>
    </div>

    <div class="section-box">
      <h2>Koleksi Saya</h2>
      <div id="libraryContainer">
        <p style="color: var(--text-muted); text-align: center; padding: 40px 0;">Memuat koleksi dari server...</p>
      </div>
    </div>
  </div>

  <script>
    // Konfigurasi Supabase
    const SUPABASE_URL = 'https://ogmtrdzimqlxhzomnnzl.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nbXRyZHppbXFseGh6b21ubnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MjI4ODgsImV4cCI6MjA5NjI5ODg4OH0.fXdfuU7iELLJC2ZJXrQMBq3YxZd2hRQc7Mi2TjZR7N8';
    
    const authHeaders = {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
    };

    const libraryContainer = document.getElementById('libraryContainer');
    const statusMessage = document.getElementById('statusMessage');
    const uploadForm = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const assetFileInput = document.getElementById('assetFile');
    const fileNameDisplay = document.getElementById('fileNameDisplay');

    // UI: Ubah teks tombol saat file dipilih
    assetFileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        fileNameDisplay.innerText = e.target.files[0].name;
      } else {
        fileNameDisplay.innerText = "Pilih File .glb / .gltf";
      }
    });

    // FUNGSI PENGHANCUR OTOMATIS (AUTO-DESTROY) & AMBIL DATA
    async function muatKoleksiAset() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/user_assets?select=*&order=created_at.desc`, {
          method: 'GET',
          headers: authHeaders
        });

        if (!response.ok) throw new Error(`Gagal memuat database`);
        
        const data = await response.json();
        const validAssets = [];
        const now = new Date();

        // Cek umur setiap aset
        for (const asset of data) {
          const createdAt = new Date(asset.created_at);
          const usiaMs = now - createdAt;
          const usiaJam = usiaMs / (1000 * 60 * 60);

          if (usiaJam >= 24) {
            // EKSEKUSI AUTO-DESTROY JIKA LEBIH DARI 24 JAM!
            console.log(`Menghapus aset kadaluarsa: ${asset.asset_name}`);
            
            // 1. Hapus dari Database
            await fetch(`${SUPABASE_URL}/rest/v1/user_assets?id=eq.${asset.id}`, { method: 'DELETE', headers: authHeaders });
            
            // 2. Hapus file 3D asli dari Storage
            await fetch(`${SUPABASE_URL}/storage/v1/object/ar_assets/${asset.file_path}`, { method: 'DELETE', headers: authHeaders });
          } else {
            // Jika belum 24 jam, masukkan ke daftar untuk ditampilkan
            asset.sisaJam = 24 - usiaJam;
            validAssets.push(asset);
          }
        }

        if (validAssets.length === 0) {
          libraryContainer.innerHTML = '<p style="text-align:center; color:#888;">Ruangan kosong. Silakan unggah model 3D pertama Anda!</p>';
          return;
        }

        let gridHtml = '<div class="library-grid">';
        validAssets.forEach(asset => {
          const sisaWaktuTeks = asset.sisaJam < 1 
            ? `${Math.floor(asset.sisaJam * 60)} menit` 
            : `${Math.floor(asset.sisaJam)} jam`;

          const shareLink = `${window.location.origin}${window.location.pathname}?model=${encodeURIComponent(asset.file_url)}&name=${encodeURIComponent(asset.asset_name)}`;
          
          gridHtml += `
            <div class="asset-card">
              <h3 class="asset-title">${asset.asset_name}</h3>
              <div class="asset-timer">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Hancur dalam ${sisaWaktuTeks}
              </div>
              <model-viewer src="${asset.file_url}" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate></model-viewer>
              <div class="btn-group">
                <button class="btn-secondary" onclick="window.open('${asset.file_url}', '_blank')">Layar Penuh</button>
                <button class="btn-secondary" style="background:#e8f2ff; color:#0071e3;" onclick="navigator.clipboard.writeText('${shareLink}').then(()=>alert('Link Share Tersalin!'))">🔗 Bagikan</button>
              </div>
            </div>
          `;
        });
        gridHtml += '</div>';
        libraryContainer.innerHTML = gridHtml;

      } catch (err) {
        libraryContainer.innerHTML = `<div class="status-msg error"><strong>Error:</strong> ${err.message}</div>`;
      }
    }

    // FUNGSI UPLOAD DATA
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = assetFileInput.files[0];
      const name = document.getElementById('assetName').value;

      if (!file) return;

      submitBtn.disabled = true;
      submitBtn.innerText = "Mengunggah...";
      statusMessage.innerHTML = '<div class="status-msg loading">⏳ Mengunggah file ke satelit... Mohon tunggu.</div>';

      try {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.floor(Math.random()*1000)}.${fileExt}`;
        const filePath = `models/${fileName}`;

        // 1. Upload
        const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/ar_assets/${filePath}`, {
          method: 'POST',
          headers: { ...authHeaders, 'Content-Type': file.type || 'application/octet-stream' },
          body: file
        });

        if (!uploadRes.ok) throw new Error(`Gagal unggah file.`);

        const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/ar_assets/${filePath}`;

        // 2. Simpan Database
        const dbRes = await fetch(`${SUPABASE_URL}/rest/v1/user_assets`, {
          method: 'POST',
          headers: { ...authHeaders, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({ asset_name: name, file_url: fileUrl, file_path: filePath })
        });

        if (!dbRes.ok) throw new Error(`Gagal menyimpan data.`);

        statusMessage.innerHTML = '<div class="status-msg success">✨ Aset berhasil diunggah dan aktif selama 24 jam!</div>';
        uploadForm.reset();
        fileNameDisplay.innerText = "Pilih File .glb / .gltf";
        muatKoleksiAset(); // Refresh UI

      } catch (err) {
        statusMessage.innerHTML = `<div class="status-msg error">🚨 <strong>Gagal:</strong> ${err.message}</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Mulai Unggah";
        setTimeout(() => { if(statusMessage.innerText.includes('berhasil')) statusMessage.innerHTML = ''; }, 4000);
      }
    });

    // Mulai aplikasi
    muatKoleksiAset();
  </script>
</body>
</html>
