<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Radar Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: sans-serif; padding: 20px;">
  
  <h2>Test Radar Koneksi</h2>
  <div id="status" style="padding: 15px; background: #eee; border-radius: 8px; font-weight: bold;">
    Mulai mengecek koneksi...
  </div>

  <script>
    const statusEl = document.getElementById('status');

    try {
      if (typeof window.supabase === 'undefined') {
        throw new Error("Library Supabase diblokir oleh jaringan/browser!");
      }

      statusEl.innerHTML = "<span style='color:blue'>1. Supabase Client termuat. Mencoba menembus database...</span>";

      const SUPABASE_URL = 'https://ogmtrdzimqlxhzomnnzl.supabase.co'; 
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nbXRyZHppbXFseGh6b21ubnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MjI4ODgsImV4cCI6MjA5NjI5ODg4OH0.fXdfuU7iELLJC2ZJXrQMBq3YxZd2hRQc7Mi2TjZR7N8';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      supabase.from('user_assets').select('*').limit(1).then(response => {
        if (response.error) {
          statusEl.innerHTML = `<span style='color:red'>🚨 KONEKSI GAGAL: ${response.error.message}</span>`;
        } else {
          statusEl.innerHTML = `<span style='color:green'>✅ KONEKSI SUKSES! Database berhasil ditembus. Ada ${response.data.length} data.</span>`;
        }
      }).catch(err => {
        statusEl.innerHTML = `<span style='color:red'>🚨 ERROR JARINGAN: ${err.message}</span>`;
      });

    } catch (error) {
      statusEl.innerHTML = `<span style='color:red'>🚨 CRASH: ${error.message}</span>`;
    }
  </script>
</body>
</html>
